name: Deploy Laravel App to Hostgator

on:
  push:
    branches:
      - main  # Altere para o branch que você deseja fazer deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.0
      with:
        ssh-private-key: ${{ secrets.HOSTGATOR_SSH_KEY }} # teste 2

    - name: Install dependencies
      run: |
        ssh -o StrictHostKeyChecking=no Jose_testes@starttofinish.com.br "cd public_html && composer install --no-dev --optimize-autoloader"

    - name: Run migrations
      run: |
        ssh -o StrictHostKeyChecking=no Jose_testes@starttofinish.com.br "cd public_html && php artisan migrate --force"

    - name: Deploy application
      run: |
        rsync -avz --exclude='.env' --exclude='.git' --exclude='node_modules' --exclude='storage' ./ Jose_testes@starttofinish.com.br:${{ secrets.HOSTGATOR_DEPLOY_DIR }}
        ssh -o StrictHostKeyChecking=no Jose_testes@starttofinish.com.br "cd public_html && php artisan config:cache && php artisan route:cache && php artisan view:cache"

    - name: Restart services (if needed)
      run: |
        ssh -o StrictHostKeyChecking=no Jose_testes@starttofinish.com.br "sudo service php-fpm restart"