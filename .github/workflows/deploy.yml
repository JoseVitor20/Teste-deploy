name: Deploy website com push

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Obter o código mais recente
        uses: actions/checkout@v2

      - name: Teste de leitura dos Secrets
        run: |
          echo "Server: ${{ secrets.FTP_SERVER }}"
          echo "Username: ${{ secrets.FTP_USER }}"
          echo "Password: ${{ secrets.FTP_PASSWORD }}"

      - name: Realizar Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.0.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }} # estes
