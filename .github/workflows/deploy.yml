name: Deploy Laravel to Public_HTML

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Obter código mais recente
        uses: actions/checkout@v2

      - name: Enviar arquivos via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.0.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/ # Define que tudo será enviado para essa pasta
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/*
            **/tests/*
            **/storage/*
            **/database/*
            **/vendor/*

      - name: Executar comandos no servidor (via SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/public_html
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:clear
            php artisan cache:clear
            php artisan route:cache
            php artisan view:cache
